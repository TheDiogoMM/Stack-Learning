<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
body{margin:0;background:var(--bg-app);font-family:var(--font-brand);padding:28px;display:flex;align-items:center;gap:40px}
.col{display:flex;flex-direction:column;gap:10px;align-items:center}
.lbl{color:var(--text-muted);font-size:11px;letter-spacing:.08em;text-transform:uppercase}
.dark{background:#0F0F0F;padding:18px 22px;border-radius:var(--radius-lg);border:1px solid var(--border-default)}
</style></head><body>
<div class="col"><div class="dark"><img src="../assets/logo.svg" height="34"></div><span class="lbl">Lockup</span></div>
<div class="col"><div class="dark"><img src="../assets/logo-symbol.svg" height="48"></div><span class="lbl">Symbol</span></div>
<div class="col"><div class="dark" style="background:var(--brand-gradient)"><img src="../assets/logo-symbol.svg" height="48" style="filter:brightness(0) invert(1)"></div><span class="lbl">On gradient</span></div>
</body></html>
