<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
body{margin:0;background:var(--bg-app);font-family:var(--font-brand);padding:20px;display:flex;gap:14px}
.sw{flex:1;display:flex;flex-direction:column;gap:8px}
.chip{height:64px;border-radius:var(--radius-lg);border:1px solid var(--border-default)}
.n{color:var(--text-primary);font-size:12px;font-weight:600}
.h{color:var(--text-muted);font-size:11px;font-family:var(--font-mono)}
</style></head><body>
<div class="sw"><div class="chip" style="background:#0F0F0F"></div><span class="n">Black</span><span class="h">#0F0F0F · bg-app</span></div>
<div class="sw"><div class="chip" style="background:#1A1A1A"></div><span class="n">Dark Gray</span><span class="h">#1A1A1A · surface</span></div>
<div class="sw"><div class="chip" style="background:#2A2A2A"></div><span class="n">Border</span><span class="h">#2A2A2A</span></div>
<div class="sw"><div class="chip" style="background:#808080"></div><span class="n">Gray</span><span class="h">#808080 · muted</span></div>
<div class="sw"><div class="chip" style="background:#E5E5E5"></div><span class="n">Light Gray</span><span class="h">#E5E5E5 · text</span></div>
</body></html>
