<!-- @dsCard group="Brand" viewport="700x230" name="Iconography" subtitle="Minimalist line-icon library (replaces emoji)" -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
body{margin:0;background:var(--bg-app);font-family:var(--font-brand);padding:24px}
.grid{display:grid;grid-template-columns:repeat(9,1fr);gap:18px}
.i{display:flex;flex-direction:column;align-items:center;gap:6px;color:var(--text-primary)}
.i svg{width:26px;height:26px}
.i span{color:var(--text-muted);font-size:9px;font-family:var(--font-mono)}
.t{color:var(--accent-primary)}.g{color:var(--accent-secondary)}.ok{color:var(--color-success-bright)}
</style></head><body>
<!-- inline sprite (same-document <use> renders reliably) -->
<svg style="display:none">
<symbol id="i-check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12.5 10 17.5 19 6.5"/></symbol>
<symbol id="i-lock" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="5.5" y="10.5" width="13" height="9" rx="2"/><path d="M8 10.5V8a4 4 0 0 1 8 0v2.5"/></symbol>
<symbol id="i-play" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M8 5.5 18.5 12 8 18.5V5.5Z"/></symbol>
<symbol id="i-bookmark" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M7 4.5h10a1 1 0 0 1 1 1v14l-6-4-6 4v-14a1 1 0 0 1 1-1Z"/></symbol>
<symbol id="i-bookmark-fill" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"><path d="M7 4.5h10a1 1 0 0 1 1 1v14l-6-4-6 4v-14a1 1 0 0 1 1-1Z"/></symbol>
<symbol id="i-bulb" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M9 17h6M9.5 20h5"/><path d="M12 3.5a6 6 0 0 1 3.7 10.7c-.7.6-1.2 1.2-1.2 2.3h-5c0-1.1-.5-1.7-1.2-2.3A6 6 0 0 1 12 3.5Z"/></symbol>
<symbol id="i-mail" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="3.5" y="5.5" width="17" height="13" rx="2"/><path d="m4 7 8 6 8-6"/></symbol>
<symbol id="i-phone" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="7" y="3.5" width="10" height="17" rx="2"/><path d="M11 17.5h2"/></symbol>
<symbol id="i-clock" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="8.5"/><path d="M12 7.5V12l3 2"/></symbol>
<symbol id="i-chevron-left" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 6 8.5 12l6 6"/></symbol>
<symbol id="i-chevron-right" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M9.5 6 15.5 12l-6 6"/></symbol>
<symbol id="i-arrow-right" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M4.5 12h15M13 5.5 19.5 12 13 18.5"/></symbol>
<symbol id="i-code" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="m8.5 8-4 4 4 4M15.5 8l4 4-4 4M13.5 5.5l-3 13"/></symbol>
<symbol id="i-terminal" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="3.5" y="4.5" width="17" height="15" rx="2"/><path d="m7 9.5 3 2.5-3 2.5M12.5 15h4"/></symbol>
<symbol id="i-book" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M4 5.5A2 2 0 0 1 6 4h6v15H6a2 2 0 0 0-2 1.5V5.5Z"/><path d="M20 5.5A2 2 0 0 0 18 4h-6v15h6a2 2 0 0 1 2 1.5V5.5Z"/></symbol>
<symbol id="i-layers" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3.5 21 8l-9 4.5L3 8l9-4.5Z"/><path d="m3 12.5 9 4.5 9-4.5M3 16.5 12 21l9-4.5"/></symbol>
<symbol id="i-search" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="6.5"/><path d="m16 16 4 4"/></symbol>
<symbol id="i-user" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8.5" r="3.8"/><path d="M5 20c.8-3.4 3.6-5.5 7-5.5s6.2 2.1 7 5.5"/></symbol>
<symbol id="i-sparkle" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M12 4c.6 3.6 1.8 4.8 5.4 5.4-3.6.6-4.8 1.8-5.4 5.4-.6-3.6-1.8-4.8-5.4-5.4C10.2 8.8 11.4 7.6 12 4Z"/><path d="M18 15c.3 1.5.8 2 2.3 2.3-1.5.3-2 .8-2.3 2.3-.3-1.5-.8-2-2.3-2.3 1.5-.3 2-.8 2.3-2.3Z"/></symbol>
</svg>
<div class="grid">
<div class="i ok"><svg><use href="#i-check"/></svg><span>check</span></div>
<div class="i g"><svg><use href="#i-lock"/></svg><span>lock</span></div>
<div class="i t"><svg><use href="#i-play"/></svg><span>play</span></div>
<div class="i"><svg><use href="#i-bookmark"/></svg><span>bookmark</span></div>
<div class="i g"><svg><use href="#i-bookmark-fill"/></svg><span>saved</span></div>
<div class="i g"><svg><use href="#i-bulb"/></svg><span>bulb</span></div>
<div class="i"><svg><use href="#i-mail"/></svg><span>mail</span></div>
<div class="i"><svg><use href="#i-phone"/></svg><span>phone</span></div>
<div class="i"><svg><use href="#i-clock"/></svg><span>clock</span></div>
<div class="i"><svg><use href="#i-chevron-left"/></svg><span>chevron</span></div>
<div class="i"><svg><use href="#i-chevron-right"/></svg><span>chevron</span></div>
<div class="i t"><svg><use href="#i-arrow-right"/></svg><span>arrow</span></div>
<div class="i"><svg><use href="#i-code"/></svg><span>code</span></div>
<div class="i"><svg><use href="#i-terminal"/></svg><span>terminal</span></div>
<div class="i"><svg><use href="#i-book"/></svg><span>book</span></div>
<div class="i t"><svg><use href="#i-layers"/></svg><span>layers</span></div>
<div class="i"><svg><use href="#i-search"/></svg><span>search</span></div>
<div class="i"><svg><use href="#i-user"/></svg><span>user</span></div>
</div>
</body></html>
