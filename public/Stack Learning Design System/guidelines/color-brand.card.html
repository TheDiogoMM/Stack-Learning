<!-- @dsCard group="Colors" viewport="700x170" name="Brand accents" subtitle="Terracota, gold & the hero gradient" -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
body{margin:0;background:var(--bg-app);font-family:var(--font-brand);padding:20px;display:flex;gap:14px}
.sw{flex:1;display:flex;flex-direction:column;gap:8px}
.chip{height:84px;border-radius:var(--radius-lg);border:1px solid var(--border-default)}
.n{color:var(--text-primary);font-size:12px;font-weight:600}
.h{color:var(--text-muted);font-size:11px;font-family:var(--font-mono)}
</style></head><body>
<div class="sw"><div class="chip" style="background:#D4A574"></div><span class="n">Terracota</span><span class="h">#D4A574 · primary</span></div>
<div class="sw"><div class="chip" style="background:#F4A261"></div><span class="n">Gold</span><span class="h">#F4A261 · secondary</span></div>
<div class="sw"><div class="chip" style="background:var(--color-terracota-soft);border-color:#D4A574"></div><span class="n">Terracota tint</span><span class="h">13% · badge bg</span></div>
<div class="sw"><div class="chip" style="background:var(--brand-gradient)"></div><span class="n">Brand gradient</span><span class="h">135° · hero</span></div>
</body></html>
