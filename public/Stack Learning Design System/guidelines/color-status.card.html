<!-- @dsCard group="Colors" viewport="700x150" name="Status & difficulty" subtitle="Semantic + lesson-difficulty scale" -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
body{margin:0;background:var(--bg-app);font-family:var(--font-brand);padding:20px;display:flex;gap:14px}
.sw{flex:1;display:flex;flex-direction:column;gap:8px}
.chip{height:60px;border-radius:var(--radius-lg);border:1px solid var(--border-default)}
.n{color:var(--text-primary);font-size:12px;font-weight:600}
.h{color:var(--text-muted);font-size:11px;font-family:var(--font-mono)}
</style></head><body>
<div class="sw"><div class="chip" style="background:#3ECF8E"></div><span class="n">Iniciante</span><span class="h">#3ECF8E · success</span></div>
<div class="sw"><div class="chip" style="background:#F4A261"></div><span class="n">Intermediário</span><span class="h">#F4A261 · warning</span></div>
<div class="sw"><div class="chip" style="background:#E74C3C"></div><span class="n">Avançado</span><span class="h">#E74C3C · danger</span></div>
<div class="sw"><div class="chip" style="background:#27AE60"></div><span class="n">Concluída</span><span class="h">#27AE60</span></div>
</body></html>
