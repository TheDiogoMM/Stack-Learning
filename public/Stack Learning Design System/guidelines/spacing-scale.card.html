<!-- @dsCard group="Spacing" viewport="700x150" name="Spacing scale" subtitle="4px base unit" -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
body{margin:0;background:var(--bg-app);color:var(--text-primary);font-family:var(--font-brand);padding:24px;display:flex;gap:18px;align-items:flex-end}
.s{display:flex;flex-direction:column;align-items:center;gap:8px}
.bar{background:var(--accent-primary);border-radius:2px;width:24px}
.l{font-family:var(--font-mono);color:var(--text-muted);font-size:11px}
</style></head><body>
<div class="s"><div class="bar" style="height:4px"></div><span class="l">4</span></div>
<div class="s"><div class="bar" style="height:8px"></div><span class="l">8</span></div>
<div class="s"><div class="bar" style="height:12px"></div><span class="l">12</span></div>
<div class="s"><div class="bar" style="height:16px"></div><span class="l">16</span></div>
<div class="s"><div class="bar" style="height:24px"></div><span class="l">24</span></div>
<div class="s"><div class="bar" style="height:32px"></div><span class="l">32</span></div>
<div class="s"><div class="bar" style="height:40px"></div><span class="l">40</span></div>
<div class="s"><div class="bar" style="height:60px"></div><span class="l">60</span></div>
</body></html>
