<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; background: var(--bg-app); color: var(--text-primary); font-family: var(--font-brand); padding: 24px; }
  .wrap { display: flex; flex-direction: column; gap: 22px; }
  .group { display: flex; flex-direction: column; gap: 10px; }
  .lbl { color: var(--text-muted); font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; }
  .row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .iconrow { display: flex; gap: 14px; flex-wrap: wrap; color: var(--text-primary); }
</style>
</head>
<body>
<div id="root" class="wrap"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
const { Button, Badge, Card, Input, Tabs, ProgressBar, Icon } = window.StackLearningDesignSystem_7ae9fc;

function Demo() {
  const [tab, setTab] = React.useState('conteudo');
  return (
    <>
      <div className="group">
        <span className="lbl">Buttons</span>
        <div className="row">
          <Button>Entrar</Button>
          <Button variant="success" iconLeft="check">Concluída</Button>
          <Button variant="secondary" iconRight="arrow-right">Próxima</Button>
          <Button variant="outline" iconLeft="bookmark">Salvar</Button>
          <Button variant="ghost" size="sm">Cancelar</Button>
          <Button disabled>Bloqueado</Button>
        </div>
      </div>

      <div className="row" style={{ gap: 28, alignItems: 'flex-start' }}>
        <div className="group">
          <span className="lbl">Badges</span>
          <div className="row">
            <Badge tone="terracota">React 19</Badge>
            <Badge tone="beginner">Iniciante</Badge>
            <Badge tone="intermediate">Intermediário</Badge>
            <Badge tone="advanced">Avançado</Badge>
            <Badge tone="neutral">45 min</Badge>
          </div>
        </div>
      </div>

      <div className="row" style={{ gap: 16, alignItems: 'stretch' }}>
        <Card accent="var(--tech-react)" hover padding={16} style={{ width: 200 }}>
          <div style={{ fontWeight: 700, marginBottom: 6 }}>React 19</div>
          <div style={{ color: 'var(--text-muted)', fontSize: 13, marginBottom: 12 }}>Componentes, hooks e context</div>
          <ProgressBar value={62} color="var(--tech-react)" height={4} />
        </Card>
        <Card padding={16} style={{ width: 240, display: 'flex', flexDirection: 'column', gap: 12 }}>
          <Input label="Email" type="email" placeholder="seu@email.com" />
          <ProgressBar value={40} />
        </Card>
      </div>

      <div className="group" style={{ maxWidth: 360 }}>
        <span className="lbl">Tabs</span>
        <Tabs
          tabs={[{ id: 'conteudo', label: 'Conteúdo' }, { id: 'lab', label: 'Mini-Lab' }, { id: 'recursos', label: 'Recursos' }]}
          value={tab} onChange={setTab}
        />
      </div>

      <div className="group">
        <span className="lbl">Icons</span>
        <div className="iconrow">
          {['check','lock','play','bookmark','bulb','clock','code','terminal','book','layers','search','user','sparkle','arrow-right'].map(n =>
            <Icon key={n} name={n} size={22} />)}
        </div>
      </div>
    </>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
